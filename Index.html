<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aaradhya ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff4e8a,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
background:rgba(255,255,255,0.9);
padding:50px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
max-width:520px;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h1{
font-size:45px;
color:#ff2e63;
text-shadow:0 0 20px #ff8fab;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff2e63; }
to{ text-shadow:0 0 25px #ff2e63,0 0 40px pink; }
}

#message{
font-size:18px;
margin-top:20px;
min-height:70px;
}

button{
padding:14px 30px;
font-size:16px;
border:none;
border-radius:30px;
cursor:pointer;
margin:12px;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
box-shadow:0 5px 15px rgba(255,0,100,0.4);
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#ddd;
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.firework{
position:absolute;
font-size:35px;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(0);}
100%{transform:scale(2);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1>AARADHYA ❤️</h1>

<p id="message"></p>

<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>

</div>

<script>

const text="Hey Aaradhya ❤️ I made this little website just for you. You make my world brighter and my heart happier. Will you be my special person? 💖";

let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,45);
}
}

typeWriter();

document.getElementById("yes").onclick=function(){

document.querySelector(".container").innerHTML=
"<h1>YAY AARADHYA!! ❤️</h1><p>You just made me the happiest person alive 💖</p>";

for(let i=0;i<60;i++){

let fire=document.createElement("div");
fire.className="firework";
fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";

document.body.appendChild(fire);

setTimeout(()=>{fire.remove()},1000);

}

}

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{

noBtn.style.position="absolute";
noBtn.style.left=Math.random()*window.innerWidth+"px";
noBtn.style.top=Math.random()*window.innerHeight+"px";

});

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(10+Math.random()*35)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

setInterval(createHeart,150);

</script>

</body>
</html>
