<!DOCTYPE html>
<html>
<head>
<title>Aaradhya ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff5f8a,#ff9aa2,#ffd1dc);
overflow:hidden;
color:white;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* container */

.container{
background:rgba(255,255,255,0.1);
padding:50px;
border-radius:25px;
text-align:center;
backdrop-filter:blur(10px);
}

/* title */

h1{
font-size:50px;
text-shadow:0 0 20px pink;
}

/* buttons */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
}

#yes{
background:#ff2e63;
color:white;
}

#no{
background:white;
color:black;
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* fireworks */

.firework{
position:absolute;
font-size:35px;
animation:explode 1s forwards;
}

@keyframes explode{
0%{transform:scale(0);}
100%{transform:scale(2);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<h1>AARADHYA ❤️</h1>

<p id="text"></p>

<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>

/* typing message */

const msg="Hey Aaradhya ❤️ I made this website just for you. You make my world brighter. Will you be my special person? 💖";

let i=0;

function typing(){

if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(typing,40);
}

}

typing();

/* yes button */

document.getElementById("yes").onclick=function(){

document.querySelector(".container").innerHTML="<h1>YAY AARADHYA ❤️</h1><p>You made me the happiest person alive 💖</p>";

for(let i=0;i<80;i++){

let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},1000);

}

}

/* no button runs */

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.position="absolute";
no.style.left=Math.random()*window.innerWidth+"px";
no.style.top=Math.random()*window.innerHeight+"px";

});

/* heart rain */

function heart(){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*30)+"px";

document.body.appendChild(h);

setTimeout(()=>{h.remove()},6000);

}

setInterval(heart,120);

/* stars */

for(let i=0;i<120;i++){

let s=document.createElement("div");
s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}

</script>

</body>
</html>
